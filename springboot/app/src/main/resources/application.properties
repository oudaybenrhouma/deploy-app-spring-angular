server.port=8081

# ─── Database ───────────────────────────────────────────────────────────────
# When running locally (non-Docker), change "mysql" to "localhost"
spring.datasource.url=jdbc:mysql://mysql:3306/demo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ─── CORS ────────────────────────────────────────────────────────────────────
# Overridden at runtime by Docker Compose environment variables
spring.mvc.cors.mapping=/**
spring.mvc.cors.allowed-origins=http://localhost:4200
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE
spring.mvc.cors.allowed-headers=*
