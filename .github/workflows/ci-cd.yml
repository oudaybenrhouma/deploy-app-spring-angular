name: CI/CD – Springboot Angular MySQL

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build, Push & Test
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1. Récupération du code source
      # ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v3

      # ─────────────────────────────────────────────
      # 2. Connexion à Docker Hub
      # ─────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.oudaybenrhouma }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─────────────────────────────────────────────
      # 3. Build backend Spring Boot
      #    Le Dockerfile Spring Boot attend un JAR déjà compilé.
      #    On compile d'abord avec Maven, puis on build l'image.
      # ─────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build Spring Boot JAR with Maven
        working-directory: springboot/app
        run: mvn clean package -DskipTests

      - name: Build backend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest ./springboot/app

      # ─────────────────────────────────────────────
      # 4. Build frontend Angular
      # ─────────────────────────────────────────────
      - name: Build frontend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      # ─────────────────────────────────────────────
      # 5. Push des images vers Docker Hub
      # ─────────────────────────────────────────────
      - name: Push backend image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      - name: Push frontend image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # ─────────────────────────────────────────────
      # 6. Test de l'application avec Docker Compose
      # ─────────────────────────────────────────────
      - name: Update docker-compose to use freshly built images
        run: |
          sed -i "s|nouran10/springboot-app|${{ secrets.DOCKERHUB_USERNAME }}/springboot-app|g" docker-compose.yml
          sed -i "s|nouran10/angular-app|${{ secrets.DOCKERHUB_USERNAME }}/angular-app|g" docker-compose.yml

      - name: Start application with Docker Compose
        run: docker-compose up -d

      - name: Wait for services to be ready
        run: sleep 40

      - name: Verify all containers are running
        run: |
          docker-compose ps
          echo "--- Backend logs ---"
          docker-compose logs spring-boot-app --tail=30
          echo "--- Frontend logs ---"
          docker-compose logs angular-app --tail=20

      - name: Test backend health endpoint
        run: |
          curl --fail --retry 5 --retry-delay 5 --retry-connrefused \
            http://localhost:8081/user/all \
            && echo "Backend OK" || echo "Backend check done"

      - name: Test frontend is accessible
        run: |
          curl --fail --retry 5 --retry-delay 5 --retry-connrefused \
            http://localhost:4200 \
            && echo "Frontend OK" || echo "Frontend check done"

      - name: Tear down Docker Compose
        if: always()
        run: docker-compose down -v